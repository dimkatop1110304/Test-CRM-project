<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Клининг — Заказ уборки</title>
    <style>
        /* Это CSS — здесь мы задаем внешний вид */
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; font-size: 16px; }
        button:hover { background: #219150; }
        .status-box { margin-top: 20px; padding: 15px; border: 1px dashed #3498db; background: #ebf5fb; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Клининг-сервис</h1>
    <p>Заполните форму, чтобы оставить заявку на уборку.</p>

    <!-- Форма заказа (Шаг 1: HTML-структура) -->
    <form id="orderForm">
        <div class="form-group">
            <label>Ваше имя:</label>
            <input type="text" id="name" placeholder="Иван Иванов" required>
        </div>

        <div class="form-group">
            <label>Тип уборки:</label>
            <select id="serviceType">
                <option value="standard">Стандартная</option>
                <option value="general">Генеральная</option>
                <option value="after-repair">После ремонта</option>
            </select>
        </div>

        <div class="form-group">
            <label>Адрес:</label>
            <input type="text" id="address" placeholder="ул. Пушкина, д. 10" required>
        </div>

        <button type="submit">Заказать уборку</button>
    </form>

    <!-- Блок статуса (Шаг 2: Здесь будет работать JS) -->
    <div id="statusArea" class="status-box" style="display:none;">
        <h3>Статус вашего заказа:</h3>
        <p><strong>Заказ №123:</strong> <span id="statusText">Обработка...</span></p>
    </div>
</div>

<script>
    // Это JavaScript — здесь мы оживляем кнопку
    const form = document.getElementById('orderForm');
    const statusArea = document.getElementById('statusArea');

    form.addEventListener('submit', function(event) {
        event.preventDefault(); // Чтобы страница не перезагружалась
        
        // Показываем блок статуса
        statusArea.style.display = 'block';
        alert('Заявка отправлена! Теперь вы можете видеть статус.');
        
        // Имитация изменения статуса через 3 секунды
        setTimeout(() => {
            document.getElementById('statusText').innerText = 'Клинер назначен и выезжает 🏃‍♂️';
        }, 3000);
    });
</script>

</body>
</html>
